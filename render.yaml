services:
  - type: web
    name: onda-planification-api
    env: docker
    plan: free
    region: frankfurt # You can change this to your preferred region (e.g., oregon, ohio)
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8080
      # Use an internal PostgreSQL database if you create one on Render
      # Or your external database connection string
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: onda-db
      #     property: connectionString
      # - key: DB_DIALECT
      #   value: org.hibernate.dialect.PostgreSQLDialect

  # Optional: Create a free PostgreSQL database
  # - type: pgo
  #   name: onda-db
  #   plan: free
  #   region: frankfurt