spring.application.name=moduel_planification

server.port=${PORT:8080}

# Database settings
# Allow overriding with DATABASE_URL or SPRING_DATASOURCE_URL in production
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/planification?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Use generic dialect so it can adapt if using Postgres on Render vs MySQL locally
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}